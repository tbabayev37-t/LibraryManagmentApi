<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitabxana Menecment Sistemi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">

    <div class="container bg-white p-4 rounded shadow">
        <h1 class="mb-4 text-center text-primary">📚 Kitablar Siyahısı (Front-end)</h1>
        
        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Kitab Adı</th>
                    <th>Reytinq</th>
                    <th>Müəllif</th>
                </tr>
            </thead>
            <tbody id="books-table-body">
                </tbody>
        </table>
    </div>

    <script>
        // ⚠️ BURA DİQQƏT: Öz Swagger-indəki port nömrəsini bura yaz (Məsələn: localhost:7237)
        const API_URL = "https://localhost:7237/api/Books"; 

        async function getBooks() {
            try {
                // Bizim .NET API-ımıza sorğu atırıq
                const response = await fetch(API_URL);
                const books = await response.json();

                const tableBody = document.getElementById("books-table-body");
                tableBody.innerHTML = ""; // İçi təmizləyirik

                // Gələn kitabları tək-tək cədvələ yazdırırıq
                books.forEach(book => {
                    const row = `
                        <tr>
                            <td>${book.id}</td>
                            <td><strong>${book.bookName}</strong></td>
                            <td>⭐ ${book.bookRating ?? 'Yoxdur'}</td>
                            <td><span class="badge bg-success">${book.authorFullName}</span></td>
                        </tr>
                    `;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error("Xəta baş verdi:", error);
                alert("API ilə əlaqə qurula bilmədi!");
            }
        }

        // Səhifə açılanda funksiyanı işə sal
        getBooks();
    </script>
</body>
</html>
